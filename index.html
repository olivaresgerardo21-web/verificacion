<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VODEXPRIME - Streaming de Alto Nivel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .hero-gradient { background: linear-gradient(to right, #050505 30%, transparent 100%), url('https://images.unsplash.com/photo-1614728263952-84ea256f9679?auto=format&fit=crop&w=1200&q=80'); background-size: cover; }
        .support-btn { position: fixed; bottom: 20px; right: 20px; transition: transform 0.3s; }
        .support-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-10 py-5 bg-black bg-opacity-90 sticky top-0 z-50">
        <div class="text-3xl font-bold tracking-tighter">VODEX<span class="gold-text">PRIME</span></div>
        <div class="hidden md:flex space-x-8 text-sm font-medium">
            <a href="#" class="hover:text-gray-400">Home</a>
            <a href="#" class="hover:text-gray-400">Movies</a>
            <a href="#" class="hover:text-gray-400">Series</a>
            <a href="#" class="hover:text-gray-400">Music</a>
            <a href="#" class="gold-text font-bold">VIP</a>
        </div>
        <div class="flex items-center space-x-4">
            <button class="text-xl">🔍</button>
            <div class="w-8 h-8 bg-gray-700 rounded-full"></div>
        </div>
    </nav>

    <section class="h-[70vh] hero-gradient flex items-center px-10">
        <div class="max-w-2xl">
            <p class="uppercase tracking-widest text-xs mb-2">Película Destacada</p>
            <h1 class="text-6xl font-black mb-4">INTERSTELLAR:<br>EL VIAJE</h1>
            <div class="flex space-x-4 mb-6">
                <button class="gold-bg text-black px-8 py-2 font-bold rounded">VER AHORA</button>
                <button class="border border-white px-8 py-2 font-bold rounded bg-white bg-opacity-10 hover:bg-opacity-20">+ MI LISTA</button>
            </div>
        </div>
    </section>

    <div class="px-10 -mt-20 relative z-10">
        <div class="bg-zinc-900 p-6 rounded-lg border border-yellow-900/50 flex flex-col md:flex-row justify-between items-center shadow-2xl">
            <div>
                <h3 class="text-xl font-bold gold-text">MIEMBROS VIP ($1 USD/MES)</h3>
                <ul class="text-sm text-gray-400 flex space-x-4 mt-2">
                    <li>✅ No Ads Externos</li>
                    <li>✅ Alta Definición</li>
                    <li>✅ Acceso Anticipado</li>
                </ul>
            </div>
            <button class="mt-4 md:mt-0 gold-bg text-black px-10 py-3 font-black rounded-full hover:scale-105 transition">SUSCRÍBETE YA</button>
        </div>
    </div>

    <a href="#" class="support-btn gold-bg p-4 rounded-full shadow-lg flex items-center justify-center">
        <span class="text-black text-2xl">🎧</span>
        <div class="absolute -top-1 -right-1 bg-red-600 w-3 h-3 rounded-full border border-black"></div>
    </a>

</body>
</html>
