<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VODEXPRIME - Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .hero-gradient { 
            background: linear-gradient(to right, #050505 40%, transparent 100%), url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; 
            background-position: center;
        }
        .movie-card { transition: transform 0.3s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.05); border: 2px solid #D4AF37; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-6 md:px-12 py-5 bg-black sticky top-0 z-50">
        <div class="text-3xl font-black tracking-tighter">VODEX<span class="gold-text">PRIME</span></div>
        <div class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest">
            <a href="#" class="hover:text-gray-400">Home</a>
            <a href="#" class="hover:text-gray-400">Movies</a>
            <a href="#" class="hover:text-gray-400">Series</a>
            <a href="#" class="hover:text-gray-400">Music</a>
            <a href="#" class="gold-text font-bold border-b border-yellow-600">VIP</a>
        </div>
        <div class="flex items-center space-x-5">
            <span class="text-xl cursor-pointer">🔍</span>
            <div class="w-9 h-9 bg-zinc-800 rounded-full border border-zinc-700"></div>
        </div>
    </nav>

    <section class="h-[60vh] md:h-[80vh] hero-gradient flex items-center px-6 md:px-12">
        <div class="max-w-3xl">
            <p class="uppercase tracking-[0.3em] text-xs mb-3 font-semibold text-gray-300">Película Destacada</p>
            <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">INTERSTELLAR:<br>EL VIAJE</h1>
            <div class="flex space-x-4">
                <button class="gold-bg text-black px-10 py-3 font-black rounded text-sm uppercase">Ver Ahora</button>
                <button class="border border-white/30 bg-white/10 px-10 py-3 font-black rounded text-sm uppercase hover:bg-white/20">+ Mi Lista</button>
            </div>
        </div>
    </section>

    <main class="px-6 md:px-12 py-10 space-y-12">
        
        <section>
            <h2 class="text-xl font-bold mb-6 uppercase tracking-widest">Tendencias</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="movie-card bg-zinc-900 aspect-[2/3] rounded-md overflow-hidden shadow-lg border border-white/5"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400&q=80" class="w-full h-full object-cover"></div>
                <div class="movie-card bg-zinc-900 aspect-[2/3] rounded-md overflow-hidden shadow-lg border border-white/5"><img src="https://images.unsplash.com/photo-1594908900066-3f47337549d8?w=400&q=80" class="w-full h-full object-cover"></div>
                <div class="movie-card bg-zinc-900 aspect-[2/3] rounded-md overflow-hidden shadow-lg border border-white/5"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400&q=80" class="w-full h-full object-cover"></div>
                <div class="movie-card bg-zinc-900 aspect-[2/3] rounded-md overflow-hidden shadow-lg border border-white/5"><img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=400&q=80" class="w-full h-full object-cover"></div>
                <div class="movie-card bg-zinc-900 aspect-[2/3] rounded-md overflow-hidden shadow-lg border border-white/5"><img src="https://images.unsplash.com/photo-1542204172-3c1f11c0c80d?w=400&q=80" class="w-full h-full object-cover"></div>
            </div>
        </section>

        <section class="bg-gradient-to-r from-zinc-900 to-black p-8 rounded-xl border border-yellow-900/30 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h3 class="text-2xl font-black gold-text italic mb-2">MIEMBROS VIP ($1 USD/MES)</h3>
                <div class="flex space-x-6 text-xs font-bold text-gray-400">
                    <span>✔️ SIN ADS EXTERNOS</span>
                    <span>✔️ ALTA DEFINICIÓN</span>
                    <span>✔️ ACCESO ANTICIPADO</span>
                </div>
            </div>
            <button class="mt-6 md:mt-0 gold-bg text-black px-12 py-4 font-black rounded-full text-sm uppercase tracking-tighter hover:scale-105 transition">Suscríbete Ya</button>
        </section>

    </main>

    <div class="fixed bottom-6 right-6">
        <button class="gold-bg p-4 rounded-full shadow-2xl flex items-center justify-center group relative">
            <span class="text-black text-2xl">🎧</span>
            <span class="absolute right-16 bg-black border border-yellow-600 text-[10px] py-1 px-3 rounded hidden group-hover:block whitespace-nowrap">Soporte 24/7</span>
            <div class="absolute -top-1 -right-1 bg-red-600 w-3 h-3 rounded-full border-2 border-black animate-pulse"></div>
        </button>
    </div>

</body>
</html>
